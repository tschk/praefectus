name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - run: rustup toolchain install stable --profile minimal --component clippy,rustfmt
      - run: rustup default stable
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-features
      - run: cargo check --locked --all-targets --all-features
      - run: cargo build --locked --release
      - run: cargo package --locked
        if: matrix.os == 'ubuntu-latest'

  msrv:
    name: Rust 1.87 (MSRV)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - run: rustup toolchain install 1.87.0 --profile minimal
      - run: rustup default 1.87.0
      - run: cargo check --locked --all-targets --all-features

  integrations:
    name: Plugins
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
        working-directory: plugins/openclaw
      - run: bun audit
        working-directory: plugins/openclaw
      - run: bun run licenses
        working-directory: plugins/openclaw
      - run: bun run format
        working-directory: plugins/openclaw
      - run: bun run lint
        working-directory: plugins/openclaw
      - run: bun run typecheck
        working-directory: plugins/openclaw
      - run: bun test
        working-directory: plugins/openclaw
      - run: bun run build
        working-directory: plugins/openclaw
      - run: python3 -m venv "${RUNNER_TEMP}/praefectus-hermes-venv"
      - run: |
          "${RUNNER_TEMP}/praefectus-hermes-venv/bin/python" -m pip install --requirement plugins/hermes/requirements-dev.txt
      - run: |
          "${RUNNER_TEMP}/praefectus-hermes-venv/bin/python" -m ruff format --check plugins/hermes
      - run: |
          "${RUNNER_TEMP}/praefectus-hermes-venv/bin/python" -m ruff check plugins/hermes
      - run: |
          "${RUNNER_TEMP}/praefectus-hermes-venv/bin/python" -m ty check --python-version 3.10 --ignore unresolved-import plugins/hermes
      - run: |
          "${RUNNER_TEMP}/praefectus-hermes-venv/bin/python" plugins/hermes/test_plugin.py
        env:
          PYTHONWARNINGS: error::ResourceWarning
      - run: |
          "${RUNNER_TEMP}/praefectus-hermes-venv/bin/python" -m compileall -q plugins/hermes

  security:
    name: Release sanity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false
      - run: rustup toolchain install stable --profile minimal
      - run: rustup default stable
      - run: cargo metadata --locked --format-version 1 > /dev/null
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit --deny warnings
      - run: cargo install cargo-deny --version 0.19.5 --locked
      - run: cargo deny check advisories bans licenses sources
      - run: test "$(sed -n '3p' LICENSE)" = "Copyright (c) 2026 The Software Company of Hong Kong & Contributors"
      - run: test "$(sed -n 's/^license = //p' Cargo.toml)" = '"ISC"'
      - run: '! rg -n "rs_peekaboo" Cargo.toml Cargo.lock src tests plugins'
      - run: '! git grep -I -n -E -e "-----BEGIN (RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----|AKIA[0-9A-Z]{16}"'
